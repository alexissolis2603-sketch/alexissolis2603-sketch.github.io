<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styl.css"> 
    <title>JVA - Tecnología</title>
</head>
<body style="margin: 0; background-color: #050505; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; padding: 20px;">

    <div class="container" style="
        background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
        padding: 50px;
        border-radius: 30px;
        border: 1px solid #333;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 15px rgba(0, 212, 255, 0.05);
        max-width: 700px;
        width: 100%;
    ">
        
        <h2 style="
            color: #ffffff;
            font-size: 2.5rem;
            margin: 0 0 40px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            border-bottom: 2px solid #00d4ff;
            display: inline-block;
            padding-bottom: 10px;
            width: 100%;
        ">
            Nuestra <span style="color: #00d4ff;">Misión</span>
        </h2>
        
        <div class="grid">
            
            <div class="card" style="text-align: center;">
                
                <div style="
                    height: 2px; 
                    background: linear-gradient(90deg, transparent, #00d4ff, transparent); 
                    margin-bottom: 40px;
                "></div>
                
                <div class="specs" style="text-align: left; margin: 0 auto; max-width: 500px;">
                    
                    <div style="
                        background: rgba(255, 255, 255, 0.03); 
                        padding: 20px; 
                        border-radius: 15px; 
                        margin-bottom: 20px; 
                        border-left: 4px solid #00d4ff;
                    ">
                        <p style="color: #e0e0e0; font-size: 1.1rem; margin: 0; line-height: 1.5;">
                            <strong style="color: #00d4ff; text-transform: uppercase; font-size: 0.9rem; display: block; margin-bottom: 5px;">
                                🎯 Nuestro Propósito
                            </strong> 
                            Brindar soluciones tecnológicas accesibles y de alta calidad para todos nuestros aliados.
                        </p>
                    </div>

                    <div style="
                        background: rgba(255, 255, 255, 0.03); 
                        padding: 20px; 
                        border-radius: 15px; 
                        border-left: 4px solid #ffffff;
                    ">
                        <p style="color: #e0e0e0; font-size: 1.1rem; margin: 0; line-height: 1.5;">
                            <strong style="color: #ffffff; text-transform: uppercase; font-size: 0.9rem; display: block; margin-bottom: 5px;">
                                🚀 Tu Crecimiento
                            </strong> 
                            Potenciar el éxito de nuestros clientes en JVA mediante innovación constante.
                        </p>
                    </div>
                    
                </div>
            
            </div>

        </div>
    </div>

</body>
</html>
