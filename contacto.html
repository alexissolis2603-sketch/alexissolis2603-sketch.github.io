<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styl.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Contacto - JVA Tecnología</title>
</head>
<body>

<div class="container">
    <h2>Canales de Atención</h2>
    <div class="grid">
        
        <div class="card">
            <h3>Información de Contacto</h3>
            
            <img src="Imagenes/contactanos.png" alt="Soporte Técnico JVA Tecnología" class="producto-img">
            
            <div style="text-align: left; margin-top: 20px;">
                <p><strong>📍 Dirección:</strong> Av. 12 de Noviembre y Maldonado</p>
                <p><strong>📞 Teléfono:</strong> 0993009808</p>
                <p><strong>✉️ Email:</strong> info@jvatecnologia.com</p>
            </div>

            <hr style="border-color: var(--borde-suave); margin: 20px 0;">

            <h3>Horarios de Atención</h3>
            <div style="text-align: left;">
                <p><strong>Lunes a Viernes:</strong> 9:00 AM - 6:00 PM</p>
                <p><strong>Sábados:</strong> 9:00 AM - 12:00 PM</p>
                <p><strong>Domingos:</strong> Cerrado</p>
            </div>
            
            <a href="index.html" class="btn">Volver al inicio</a>
        </div>

        <div class="card">
            <h3>Envíanos un mensaje</h3>
            <form>
                <input type="text" placeholder="Nombre completo">
                <input type="email" placeholder="Correo electrónico">
                <textarea placeholder="¿En qué podemos ayudarte?" rows="4"></textarea>
                <button type="submit" class="btn">Enviar Consulta</button>
            </form>
        </div>

    </div>
</div>

</body>
</html>
